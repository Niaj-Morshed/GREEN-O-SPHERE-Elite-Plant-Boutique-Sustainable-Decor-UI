<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-O-SPHERE | Premium Plant Boutique</title>

     <link rel="icon" type="image/x-icon" href="./image/1.webp">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #10b981;
            /* Emerald Green */
            --accent: #f59e0b;
            /* Amber */
            --bg: #064e3b;
            --text: #ecfdf5;
            --glass: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg: #f0fdf4;
            --text: #064e3b;
            --glass: rgba(0, 0, 0, 0.03);
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* --- Animated Navbar --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 15px 35px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--primary);
        }

        .nav-tools {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-tools i {
            cursor: pointer;
            font-size: 1.2rem;
        }

        .cart-icon {
            position: relative;
        }

        #cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 2px 5px;
            border-radius: 50%;
            display: none;
        }

        /* --- Search System --- */
        .search-overlay {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            z-index: 999;
            display: none;
        }

        #searchInput {
            width: 100%;
            padding: 12px 25px;
            border-radius: 50px;
            border: 2px solid var(--primary);
            background: var(--bg);
            color: var(--text);
            outline: none;
        }

        /* --- Hero Section --- */
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at top, var(--primary) -100%, transparent 60%);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
        }

        .hero p {
            opacity: 0.7;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        /* --- Unique Leaf Filters --- */
        .filter-section {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 40px 5%;
            position: sticky;
            top: 100px;
            z-index: 900;
        }

        .filter-btn {
            padding: 12px 25px;
            border: none;
            background: var(--glass);
            color: var(--text);
            cursor: pointer;
            font-weight: 700;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            /* Organic Leaf Shape */
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            transform: scale(1.1);
        }

        /* --- Product Grid --- */
        .grid-container {
            max-width: 1400px;
            margin: 0 auto 100px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            padding: 0 20px;
        }

        @media (min-width: 1024px) {
            .grid-container {
                grid-template-columns: repeat(4, 1fr);
                gap: 40px;
            }
        }

        .plant-card {
            background: var(--glass);
            border-radius: 40px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            box-shadow: var(--card-shadow);
        }

        .plant-card:hover {
            transform: translateY(-15px) rotate(2deg);
            border-color: var(--primary);
        }

        .img-box {
            width: 100%;
            aspect-ratio: 4/5;
            border-radius: 30px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .price-tag {
            position: absolute;
            top: 30px;
            right: 30px;
            background: var(--accent);
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .plant-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }

        .plant-info p {
            font-size: 0.8rem;
            opacity: 0.6;
            margin-bottom: 15px;
        }

        .buy-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 20px;
            background: var(--primary);
            color: white;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .buy-btn:hover {
            background: var(--text);
            color: var(--bg);
        }

        /* --- Toast Notification --- */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 800;
            display: none;
            z-index: 2000;
        }

        footer {
            text-align: center;
            padding: 100px 5%;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0.5;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">GREEN-O.</div>
        <div class="nav-tools">
            <i class="fas fa-search" id="searchBtn"></i>
            <i class="fas fa-shopping-basket cart-icon"><span id="cart-badge">0</span></i>
            <i class="fas fa-moon" id="themeToggle"></i>
        </div>
        <div class="search-overlay" id="searchBar">
            <input type="text" id="searchInput" placeholder="Search plants...">
        </div>
    </nav>

    <div id="toast">Added to your garden! 🌿</div>

    <header class="hero">
        <h1>Breathe Life into <br> Your Space.</h1>
        <p>PREMIUM INDOOR & OUTDOOR COLLECTION 2026</p>
    </header>

    <div class="filter-section">
        <button class="filter-btn active" onclick="filter('all')">All Plants</button>
        <button class="filter-btn" onclick="filter('indoor')">Indoor</button>
        <button class="filter-btn" onclick="filter('outdoor')">Outdoor</button>
        <button class="filter-btn" onclick="filter('flower')">Flowers</button>
        <button class="filter-btn" onclick="filter('fruit')">Fruits</button>
    </div>

    <div class="grid-container" id="plantGrid">
    </div>

    <footer>
        <p>&copy; 2026 | GREEN-O-SPHERE BOUTIQUE. ALL RIGHTS RESERVED. | DEVELOPED BY NIAJ MORSHED</p>
    </footer>

    <script>
        // Generating 50 Items dynamically for demo
        const basePlants = [{
                name: "Monstera Deliciosa",
                price: "৳1200",
                cat: "indoor",
                img: "./image/1.webp"
            },
            {
                name: "Snake Plant Pro",
                price: "৳850",
                cat: "indoor",
                img: "./image/2.jpg"
            },
            {
                name: "Red Rose Bush",
                price: "৳450",
                cat: "flower",
                img: "./image/3.webp"
            },
            {
                name: "Mango Hybrid Tob",
                price: "৳2500",
                cat: "fruit",
                img: "./image/4.jpg"
            },
            {
                name: "Japanese Bonsai",
                price: "৳4500",
                cat: "outdoor",
                img: "./image/5.jpg"
            },
            {
                name: "Peace Lily",
                price: "৳650",
                cat: "indoor",
                 img: "./image/6.webp"
            },
            {
                name: "Thai Guava",
                price: "৳1800",
                cat: "fruit",
                 img: "./image/7.webp"
            },
            {
                name: "Petunia Mix",
                price: "৳300",
                cat: "flower",
                img: "./image/8.jpg"
            }
        ];

  
        let plantData = basePlants;
      

        const grid = document.getElementById('plantGrid');
        let cart = 0;

        function render(data) {
            grid.innerHTML = '';
            data.forEach(p => {
                const card = document.createElement('div');
                card.className = 'plant-card';
                card.innerHTML = `
                    <div class="price-tag">${p.price}</div>
                    <div class="img-box">
                        <img src="${p.img}" alt="${p.name}">
                    </div>
                    <div class="plant-info">
                        <p style="text-transform:uppercase; color:var(--primary); font-weight:800; font-size:10px">${p.cat}</p>
                        <h3>${p.name}</h3>
                        <p>Perfect for home aesthetics.</p>
                        <button class="buy-btn" onclick="addCart()">
                            <i class="fas fa-leaf"></i> BUY NOW
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Filter Logic
        function filter(cat) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if (cat === 'all') render(plantData);
            else render(plantData.filter(p => p.cat === cat));
        }

        // Search Logic
        document.getElementById('searchBtn').onclick = () => {
            const bar = document.getElementById('searchBar');
            bar.style.display = bar.style.display === 'block' ? 'none' : 'block';
        };

        document.getElementById('searchInput').oninput = (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = plantData.filter(p => p.name.toLowerCase().includes(val));
            render(filtered);
        };

        // Cart logic
        function addCart() {
            cart++;
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart;
            badge.style.display = 'block';

            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        // Theme Logic
        document.getElementById('themeToggle').onclick = function() {
            const isDark = document.body.getAttribute('data-theme') !== 'light';
            document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            this.className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        };

        render(plantData);
    </script>
</body>

</html>
